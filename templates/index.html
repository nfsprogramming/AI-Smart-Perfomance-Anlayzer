<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AI Smart Performance Analyzer</title>
  <!-- Tailwind CSS v3 with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <style data-purpose="global-styles">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d1117;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Background glow effects updated from blue/purple to emerald/forest/teal shades */
    .glow-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, rgba(6, 78, 59, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(20, 83, 45, 0.3) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(13, 148, 136, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 40%);
    }

    .hidden {
      display: none !important;
    }
  </style>
  <style data-purpose="card-styling">
    .main-container {
      background-color: rgba(18, 24, 27, 0.9);
      border: 1px solid rgba(16, 185, 129, 0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-field {
      background-color: #161d1f !important;
      border: 1px solid #2d3a3d !important;
      color: #e2e8f0 !important;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #059669 !important;
      --tw-ring-color: rgba(5, 150, 105, 0.3) !important;
      --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
      box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
    }

    /* Hide number input arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .btn-gradient {
      background: linear-gradient(90deg, #059669 0%, #064e3b 100%);
      transition: opacity 0.2s;
    }

    .btn-gradient:hover {
      opacity: 0.9;
    }

    .btn-gradient:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .risk-badge {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .risk-badge.risk-low {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .risk-badge.risk-med {
      background-color: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      color: #eab308;
    }

    .risk-badge.risk-high {
      background-color: rgba(225, 29, 72, 0.1);
      border: 1px solid rgba(225, 29, 72, 0.3);
      color: #e11d48;
    }

    .confidence-bar-bg {
      background-color: #1a2224;
      height: 6px;
      border-radius: 999px;
    }

    .factor-pill {
      background-color: rgba(22, 29, 31, 0.5);
      border: 1px solid rgba(16, 185, 129, 0.1);
    }
  </style>
</head>

<body class="p-6 md:p-12 w-full">
  <div class="glow-background"></div>
  <!-- BEGIN: Application Container -->
  <main class="w-full max-w-4xl mx-auto" data-purpose="app-wrapper">
    <!-- BEGIN: Page Header -->
    <header class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">
        AI Smart Performance <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">Analyzer</span>
      </h1>
      <p class="text-gray-400 text-sm md:text-base font-medium">Hybrid AI Analysis for Student Performance Prediction
      </p>
    </header>
    <!-- END: Page Header -->

    <!-- BEGIN: Dashboard Card -->
    <div class="main-container rounded-3xl p-6 md:p-10 space-y-10">
      <!-- BEGIN: Student Details Form Section -->
      <section data-purpose="student-details-form">
        <h2 class="text-xl font-bold text-white mb-6">Student Details</h2>
        <form id="predictionForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Marks -->
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider" for="marks">Marks
              (%)</label>
            <input id="marks" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="e.g. 85"
              type="number" required />
          </div>
          <!-- Attendance -->
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider"
              for="attendance">Attendance (%)</label>
            <input id="attendance" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="e.g. 95"
              type="number" required />
          </div>
          <!-- Sleep -->
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider" for="sleep_hours">Sleep
              (Hours)</label>
            <input id="sleep_hours" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="e.g. 7"
              type="number" required />
          </div>
          <!-- Screen Time -->
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider" for="screen_time">Screen
              Time (Hours)</label>
            <input id="screen_time" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="e.g. 4"
              type="number" required />
          </div>
          <!-- Assignment Delay -->
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider"
              for="assignment_delay">Assignment Delay (Days)</label>
            <input id="assignment_delay" class="input-field w-full rounded-lg px-4 py-3 text-sm" placeholder="e.g. 1"
              type="number" required />
          </div>
          <!-- Journal Entry (Full Width) -->
          <div class="md:col-span-3 space-y-2">
            <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider" for="feedback">Student
              Feedback / Journal Entry</label>
            <textarea id="feedback" class="input-field w-full rounded-lg px-4 py-3 text-sm resize-none"
              placeholder="Enter student's recent feedback..." rows="4" required></textarea>
          </div>
          <!-- Analyze Button -->
          <div class="md:col-span-3 pt-4">
            <button
              class="btn-primary btn-gradient w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg shadow-emerald-900/40 relative flex justify-center items-center"
              type="submit">
              <span class="btn-text">Analyze Risk</span>
              <div class="loading-spinner hidden">
                <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                  </path>
                </svg>
              </div>
            </button>
          </div>
        </form>
      </section>
      <!-- END: Student Details Form Section -->

      <hr class="border-gray-800/50" />

      <!-- BEGIN: Analysis Result Section -->
      <section id="resultSection" class="hidden" data-purpose="analysis-results">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
          <h2 class="text-xl font-bold text-white">Analysis Result</h2>
          <div id="riskBadge" class="risk-badge px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2">
            <!-- Dynamically populated -->
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
          <!-- Confidence Bars -->
          <div class="space-y-6">
            <h3 class="text-sm font-semibold text-gray-400">Model Confidence</h3>
            <div class="space-y-4">
              <!-- Low Risk -->
              <div class="space-y-1.5">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                  <span>Low Risk</span>
                </div>
                <div class="confidence-bar-bg relative overflow-hidden">
                  <div id="probLow" class="absolute h-full bg-emerald-700/50 rounded-full transition-all duration-500"
                    style="width: 0%"></div>
                </div>
              </div>
              <!-- Medium Risk -->
              <div class="space-y-1.5">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                  <span>Medium Risk</span>
                </div>
                <div class="confidence-bar-bg relative overflow-hidden">
                  <div id="probMed" class="absolute h-full bg-emerald-500 rounded-full transition-all duration-500"
                    style="width: 0%"></div>
                </div>
              </div>
              <!-- High Risk -->
              <div class="space-y-1.5">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                  <span>High Risk</span>
                </div>
                <div class="confidence-bar-bg relative overflow-hidden">
                  <div id="probHigh" class="absolute h-full bg-rose-900/40 rounded-full transition-all duration-500"
                    style="width: 0%"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Recommendations -->
          <div class="space-y-4">
            <h3 class="text-sm font-semibold text-gray-400">Recommendations</h3>
            <div id="recommendationsList" class="space-y-3">
              <!-- Recommendations will appear here -->
            </div>
          </div>
        </div>

        <!-- Key Factors Section -->
        <div class="mt-10 pt-6 border-t border-gray-800/50">
          <h3 class="text-sm font-semibold text-gray-400 mb-4">Key Factors (AI Explanation)</h3>
          <div id="featureImportance" class="flex flex-wrap gap-3">
            <!-- Feature tags -->
          </div>
        </div>
      </section>
      <!-- END: Analysis Result Section -->
    </div>
    <!-- END: Dashboard Card -->
  </main>
  <!-- END: Application Container -->

  <script src="/static/script.js"></script>
</body>

</html>
